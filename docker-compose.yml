services:
  postgres:
    image: postgres:16-alpine
    container_name: mdm-postgres
    environment:
      POSTGRES_DB: mdmdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mdmdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mdm-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mdm-backend:
    build:
      context: ./mdm
      dockerfile: Dockerfile
    container_name: mdm-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mdmdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      JWT_SECRET: mdmSecretKeyMoveinsync2026_ChangeInProduction
      JWT_EXPIRATION: 86400000
      MANAGEMENT_CORS_ALLOWED_ORIGINS: http://localhost:8080
      LOGGING_LEVEL_WEB: INFO
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 15

  mdm-frontend:
    build:
      context: ./mdm-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /
    container_name: mdm-frontend
    depends_on:
      mdm-backend:
        condition: service_healthy
    ports:
      - "8088:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: mdm-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      mdm-backend:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: mdm-grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  grafana_data:
